<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TaskFlow — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg: #050810;
          --surface: rgba(255,255,255,0.04);
          --border: rgba(255,255,255,0.08);
          --accent: #6EE7B7;
          --accent2: #38BDF8;
          --danger: #F87171;
          --text: #F1F5F9;
          --muted: #64748B;
          --glow: 0 0 40px rgba(110,231,183,0.15);
        }

        body {
          font-family: 'DM Sans', sans-serif;
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
        }

        /* Animated grid background */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(rgba(110,231,183,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(110,231,183,0.03) 1px, transparent 1px);
          background-size: 50px 50px;
          animation: gridMove 20s linear infinite;
          z-index: 0;
        }

        @keyframes gridMove {
          0% { transform: translateY(0); }
          100% { transform: translateY(50px); }
        }

        /* Floating orbs */
        .orb {
          position: fixed;
          border-radius: 50%;
          filter: blur(80px);
          opacity: 0.4;
          animation: float 8s ease-in-out infinite;
          z-index: 0;
        }
        .orb1 { width: 350px; height: 350px; background: #6EE7B7; top: -100px; left: -100px; animation-delay: 0s; }
        .orb2 { width: 250px; height: 250px; background: #38BDF8; bottom: -80px; right: -80px; animation-delay: -4s; }
        .orb3 { width: 180px; height: 180px; background: #818CF8; top: 50%; left: 50%; animation-delay: -2s; }

        @keyframes float {
          0%, 100% { transform: translate(0,0) scale(1); }
          33% { transform: translate(20px, -30px) scale(1.05); }
          66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        .card {
          position: relative;
          z-index: 10;
          width: 420px;
          background: rgba(10,14,26,0.85);
          border: 1px solid var(--border);
          border-radius: 24px;
          padding: 48px 44px;
          backdrop-filter: blur(24px);
          box-shadow: 0 32px 80px rgba(0,0,0,0.6), var(--glow);
          animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
          from { opacity: 0; transform: translateY(30px) scale(0.97); }
          to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 36px;
        }

        .logo-icon {
          width: 38px;
          height: 38px;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 18px;
        }

        .logo-text {
          font-family: 'Syne', sans-serif;
          font-size: 22px;
          font-weight: 800;
          letter-spacing: -0.5px;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        h1 {
          font-family: 'Syne', sans-serif;
          font-size: 28px;
          font-weight: 700;
          margin-bottom: 6px;
          letter-spacing: -0.5px;
        }

        .subtitle {
          color: var(--muted);
          font-size: 14px;
          margin-bottom: 32px;
        }

        .field {
          margin-bottom: 18px;
        }

        label {
          display: block;
          font-size: 12px;
          font-weight: 500;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: 0.8px;
          margin-bottom: 8px;
        }

        input {
          width: 100%;
          background: rgba(255,255,255,0.04);
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 13px 16px;
          color: var(--text);
          font-family: 'DM Sans', sans-serif;
          font-size: 15px;
          outline: none;
          transition: all 0.2s ease;
        }

        input:focus {
          border-color: var(--accent);
          background: rgba(110,231,183,0.05);
          box-shadow: 0 0 0 3px rgba(110,231,183,0.1);
        }

        input::placeholder { color: var(--muted); }

        .btn {
          width: 100%;
          padding: 14px;
          border: none;
          border-radius: 12px;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          color: #050810;
          font-family: 'Syne', sans-serif;
          font-size: 15px;
          font-weight: 700;
          cursor: pointer;
          letter-spacing: 0.3px;
          transition: all 0.2s ease;
          margin-top: 8px;
          position: relative;
          overflow: hidden;
        }

        .btn::after {
          content: '';
          position: absolute;
          inset: 0;
          background: rgba(255,255,255,0);
          transition: background 0.2s;
        }

        .btn:hover::after { background: rgba(255,255,255,0.1); }
        .btn:active { transform: scale(0.99); }

        .btn:disabled {
          opacity: 0.6;
          cursor: not-allowed;
        }

        .divider {
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 24px 0;
          color: var(--muted);
          font-size: 12px;
        }
        .divider::before, .divider::after {
          content: '';
          flex: 1;
          height: 1px;
          background: var(--border);
        }

        .footer-link {
          text-align: center;
          font-size: 14px;
          color: var(--muted);
        }
        .footer-link a {
          color: var(--accent);
          text-decoration: none;
          font-weight: 500;
          transition: opacity 0.2s;
        }
        .footer-link a:hover { opacity: 0.8; }

        .alert {
          padding: 12px 16px;
          border-radius: 10px;
          font-size: 14px;
          margin-bottom: 16px;
          display: none;
          animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
          from { opacity: 0; transform: translateY(-8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
        .alert.success { background: rgba(110,231,183,0.1); border: 1px solid rgba(110,231,183,0.3); color: var(--accent); }

        .spinner {
          display: inline-block;
          width: 16px; height: 16px;
          border: 2px solid rgba(5,8,16,0.3);
          border-top-color: #050810;
          border-radius: 50%;
          animation: spin 0.6s linear infinite;
          vertical-align: middle;
          margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
    <div class="logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">TaskFlow</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage your tasks</p>

    <div class="alert" id="alert"></div>

    <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
    </div>

    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <div class="divider">or</div>

    <div class="footer-link">
        Don't have an account? <a href="register.html">Create one</a>
    </div>
</div>

<script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const alert = document.getElementById('alert');

      if (!username || !password) {
        showAlert('Please fill in all fields.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.text();

        if (data === 'invalid credentials') {
          showAlert('Invalid username or password.', 'error');
        } else {
          localStorage.setItem('token', data);
          localStorage.setItem('username', username);
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        }
      } catch (e) {
        showAlert('Server error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
      el.style.display = 'block';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
